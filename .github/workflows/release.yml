name: Release

on:
  push:
    branches: [ main ]
    paths: [ 'src/**' ]

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      SolutionPath: OpenInWindsurf.sln
      VsixManifestPath: src\source.extension.vsixmanifest
      VsixPath: src\bin\Release\OpenInWindsurf.vsix
      PublishManifestPath: publishManifest.json
      Configuration: Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v3
        with:
          versionSpec: '6.x'

      - name: Determine version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v3

      - name: Restore NuGet packages
        run: nuget restore $env:SolutionPath

      - name: Set VSIX version
        uses: cezarypiatek/VsixVersionAction@1.0
        with:
          version: ${{ steps.gitversion.outputs.majorMinorPatch }}
          vsix-manifest-file: ${{ env.VsixManifestPath }}

      - name: Build extension
        run: msbuild $env:SolutionPath /t:Rebuild /p:Configuration=$env:Configuration
        env:
          DeployExtension: False

      - name: Generate release notes
        run: |
          $tag = git describe --tags --abbrev=0 2>$null
          if ($tag) {
            $log = git log "$tag..HEAD" --pretty=format:"- %s"
          } else {
            $log = git log --pretty=format:"- %s"
          }
          "## What's new`n`n$($log -join "`n")" | Out-File release_notes.md -Encoding utf8

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.gitversion.outputs.majorMinorPatch }}
          name: v${{ steps.gitversion.outputs.majorMinorPatch }}
          body_path: release_notes.md
          files: ${{ env.VsixPath }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to Visual Studio Marketplace
        uses: cezarypiatek/VsixPublisherAction@1.2
        with:
          extension-file: ${{ env.VsixPath }}
          publish-manifest-file: ${{ env.PublishManifestPath }}
          personal-access-code: ${{ secrets.VS_PUBLISHER_ACCESS_TOKEN }}
